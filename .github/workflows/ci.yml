name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          AES_MASTER_KEY: bXlfc2VjcmV0X2tleV8zMl9ieXRlc19sb25nISE=
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --ignore=tests/test_integration.py \
            -k "not integration" \
            --cov-fail-under=0

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jwt-secrets-manager:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-container \
            -e DATABASE_URL=sqlite:///test.db \
            -e REDIS_URL=redis://localhost:6379 \
            -e AES_MASTER_KEY=bXlfc2VjcmV0X2tleV8zMl9ieXRlc19sb25nISE= \
            -p 8000:8000 \
            jwt-secrets-manager:${{ github.sha }}
          sleep 5
          docker stop test-container
